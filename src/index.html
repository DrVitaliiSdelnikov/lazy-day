      .ld-splash__z--2{animation-delay:.95s}.ld-splash__z--3{animation-delay:1.9s}
      .ld-splash__name{font-size:18px;font-weight:500;color:var(--lds-pin);margin:16px 0 4px}
      .ld-splash__hint{font-family:system-ui,sans-serif;font-size:13px;color:var(--lds-text);margin:0;animation:ld-hp 2.2s ease-in-out infinite}
      @keyframes ld-rock{0%,100%{transform:rotate(-16deg) scale(1)}50%{transform:rotate(-10.5deg) scale(1.025)}}
      @keyframes ld-breath{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(.86);opacity:.34}}
      @keyframes ld-zf{0%{opacity:0;transform:translate(0,8px) scale(.75)}28%{opacity:1}100%{opacity:0;transform:translate(9px,-16px) scale(1.12)}}
      @keyframes ld-hp{0%,100%{opacity:.45}50%{opacity:1}}
      @media(prefers-reduced-motion:reduce){.ld-splash__pin,.ld-splash__shadow,.ld-splash__z,.ld-splash__hint{animation:none}.ld-splash__z{opacity:.9}}
    </style>
